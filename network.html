<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Challenge</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #terminal {
      background: #0a0a0a;
      border: 1px solid #1d3a5f;
      border-radius: 10px;
      padding: 20px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #00ff41;
      min-height: 260px;
    }
    #terminal p { margin: 2px 0; }
    #cmdrow { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
    #cmdrow span { color: #00ff41; font-family: monospace; }
    #cmdinput {
      background: transparent;
      border: none;
      outline: none;
      color: #00ff41;
      font-family: monospace;
      font-size: 0.9rem;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>

  <main class="container">
    <section class="card hero">
      <p class="tag">NETWORK CHALLENGE</p>
      <h1>something's listening</h1>
      <p class="subtitle">got access to a terminal. no idea what's on the network.</p>
    </section>

    <section class="card">
      <p>poke around. find open ports.</p>
      <p class="hint" style="margin-top:10px;">hint: check your network interfaces first. then scan whatever you find.</p>
    </section>

    <section class="card">
      <div id="terminal">
        <p>terminal ready. type 'help'</p>
      </div>
      <div id="cmdrow">
        <span>user@ctf:~$</span>
        <input id="cmdinput" type="text" autocomplete="off" spellcheck="false" placeholder="type a command..." />
      </div>
    </section>

    <section class="card">
      <div class="submit-row">
        <input id="netInput" type="text" placeholder="FLAG{your_answer_here}" />
        <button onclick="checkFlag()">Submit</button>
      </div>
      <p id="netResult" class="result"></p>
    </section>

    <section class="card">
      <a href="index.html" class="back-link">← Back to challenges</a>
    </section>
  </main>

  <script>
    var t = document.getElementById("terminal");
    var input = document.getElementById("cmdinput");

    input.addEventListener("keydown", function(e) {
      if (e.key != "Enter") return;
      var cmd = input.value.trim();
      input.value = "";

      t.innerHTML += "<p>user@ctf:~$ " + cmd + "</p>";

      if (cmd == "help") {
        t.innerHTML += "<p>&nbsp; ip addr &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; show network info</p>";
        t.innerHTML += "<p>&nbsp; nmap &lt;ip&gt; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; scan for open ports</p>";
        t.innerHTML += "<p>&nbsp; nc &lt;ip&gt; &lt;port&gt; &nbsp;&nbsp; connect to a port</p>";
        t.innerHTML += "<p>&nbsp; clear &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; clear the screen</p>";
      } else if (cmd == "clear") {
        t.innerHTML = "";
      } else if (cmd == "ip addr" || cmd == "ifconfig") {
        t.innerHTML += "<p>1: lo &nbsp;&nbsp; inet 127.0.0.1/8</p>";
        t.innerHTML += "<p>2: eth0 &nbsp; inet 10.0.0.5/24</p>";
        t.innerHTML += "<p>&nbsp;&nbsp; gateway 10.0.0.1</p>";
      } else if (cmd == "nmap 10.0.0.1") {
        t.innerHTML += "<p>Starting scan on 10.0.0.1...</p>";
        setTimeout(function() {
          t.innerHTML += "<p>PORT &nbsp;&nbsp;&nbsp;&nbsp; STATE &nbsp; SERVICE</p>";
          t.innerHTML += "<p>22/tcp &nbsp;&nbsp; open &nbsp;&nbsp; ssh</p>";
          t.innerHTML += "<p>80/tcp &nbsp;&nbsp; open &nbsp;&nbsp; http</p>";
          t.innerHTML += "<p>1337/tcp open &nbsp;&nbsp; ???</p>";
          t.innerHTML += "<p>done. 3 ports open.</p>";
        }, 800);
      } else if (cmd == "nc 10.0.0.1 1337") {
        t.innerHTML += "<p>connecting...</p>";
        setTimeout(function() {
          t.innerHTML += "<p>FLAG{p0rt_kn0ck3r}</p>";
          t.innerHTML += "<p>connection closed.</p>";
        }, 600);
      } else if (cmd.startsWith("nmap")) {
        t.innerHTML += "<p>host down. check your interfaces first.</p>";
      } else {
        t.innerHTML += "<p>command not found: " + cmd + "</p>";
      }
    });

    async function checkFlag() {
      var val = document.getElementById("netInput").value.trim();
      var res = document.getElementById("netResult");
      var hash = await sha256(val);
      var correct = "5cd99f0a1280fb83d82eef87b76b8a2e6df47533162a9170f032b431b994bc62";
      if (hash == correct) {
        res.textContent = "Correct! You found the open port.";
        res.style.color = "lightgreen";
      } else {
        res.textContent = "Not quite. Keep scanning.";
        res.style.color = "salmon";
      }
    }

    async function sha256(str) {
      var buf = new TextEncoder().encode(str);
      var hashBuf = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
  </script>
</body>
</html>
