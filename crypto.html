<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-grid"></div>

  <main class="container">
    <section class="card hero">
      <p class="tag">CRYPTO CHALLENGE</p>
      <h1>intercepted message</h1>
      <p class="subtitle">
        found this in the server logs. no clue what it means.
      </p>
    </section>

    <section class="card">
      <p style="font-family: monospace; word-break: break-all;">SU9ESntmNDN2NHVfZjFzazN1fQ==</p>
      <p style="margin-top: 20px; font-size: 0.9rem;" class="hint">hint: two layers. the first is a common web encoding — you've probably seen it in URLs and APIs. the second was once used by a great emperor.</p>
    </section>

    <section class="card">
      <div class="submit-row">
        <input id="cryptoInput" type="text" placeholder="FLAG{your_answer_here}" />
        <button onclick="checkCryptoFlag()">Submit</button>
      </div>
      <p id="cryptoResult" class="result"></p>
    </section>

    <section class="card">
      <a href="index.html" class="back-link">← Back to challenges</a>
    </section>
  </main>

  <script>
    async function checkCryptoFlag() {
      const input = document.getElementById("cryptoInput").value.trim();
      const result = document.getElementById("cryptoResult");
      const hash = await sha256(input);
      const correctHash = "6d1145eaa74e7c3f8f1eef3cafd19b095b482863aaa56fb4dc33205439f72804";
      if (hash === correctHash) {
        result.textContent = "Correct! You decoded it.";
        result.style.color = "lightgreen";
      } else {
        result.textContent = "Not quite. Keep trying.";
        result.style.color = "salmon";
      }
    }

    async function sha256(str) {
      const buf = new TextEncoder().encode(str);
      const hashBuf = await crypto.subtle.digest("SHA-256", buf);
      const hashArray = Array.from(new Uint8Array(hashBuf));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }
  </script>
</body>
</html>
